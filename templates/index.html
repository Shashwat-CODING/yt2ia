<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT2IA - Archiver</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --danger-color: #ef4444;
            --success-color: #22c55e;
            --amber-color: #f59e0b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        /* Status Bar */
        .status-bar {
            grid-column: 1 / -1;
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
            background-color: var(--card-bg);
        }

        .badge.processing {
            background-color: var(--accent-color);
            color: white;
        }

        .badge.idle {
            background-color: var(--text-secondary);
            color: #0f172a;
        }

        .badge.paused {
            background-color: var(--amber-color);
            color: #0f172a;
        }

        /* Search Section */
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input,
        select {
            background-color: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 1rem;
        }

        input {
            flex: 1;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 0.75rem;
            border-radius: 0.5rem;
        }

        .result-img {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
        }

        .result-info {
            flex: 1;
        }

        .result-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .result-sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .add-btn {
            background-color: var(--success-color);
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .add-btn.exists {
            background-color: var(--amber-color);
            cursor: not-allowed;
        }

        /* Sidebar / Queue */
        .queue-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .queue-item {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 0.75rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-left: 3px solid transparent;
        }

        .queue-item.active {
            border-left-color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.1);
        }

        .q-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #334155;
            background-size: cover;
        }

        .q-info {
            flex: 1;
            overflow: hidden;
        }

        .q-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .q-id {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .logs {
            grid-column: 1 / -1;
            background-color: #000;
            color: #22c55e;
            font-family: monospace;
            padding: 1rem;
            border-radius: 0.5rem;
            height: 200px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .pause-btn {
            background-color: var(--amber-color);
        }

        .resume-btn {
            background-color: var(--success-color);
        }
    </style>
</head>

<body>
    <div class="status-bar">
        <div id="status-badge" class="badge idle">Idle</div>
        <div class="badge">Queue: <span id="queue-count">0</span></div>
        <div class="badge">Idle Time: <span id="idle-timer">0</span>s</div>
        <div class="badge">Current Index: <span id="current-index">0</span></div>
    </div>

    <div class="container">
        <!-- Left: Search & Manual -->
        <div class="card">
            <h2>Search & Submit</h2>

            <!-- Manual Input -->
            <div class="search-box">
                <input type="text" id="manual-id" placeholder="Enter ID directly (Video/Playlist/Artist/Channel)">
                <button onclick="submitManual()">Submit ID</button>
            </div>

            <hr style="border-color: #334155; margin: 1.5rem 0;">

            <!-- Search -->
            <div class="search-box">
                <input type="text" id="search-query" placeholder="Search for artist, song, etc..."
                    onkeypress="handleEnter(event)">
                <select id="search-filter">
                    <option value="artists">Artists</option>
                    <option value="songs">Songs</option>
                    <option value="videos">Videos</option>
                    <option value="albums">Albums</option>
                    <option value="playlists">Playlists</option>
                </select>
                <button onclick="performSearch()">Search</button>
            </div>

            <div id="results-area" class="results"></div>
        </div>

        <!-- Right: Queue & Controls -->
        <div class="card">
            <h2>Queue Control</h2>

            <div class="controls">
                <button id="pause-btn" class="pause-btn" onclick="togglePause()">PAUSE 1H</button>
                <button onclick="startProcessing()" style="background-color: var(--success-color)">FORCE START</button>
            </div>

            <div id="queue-area" class="queue-list">
                <div style="text-align: center; color: #94a3b8;">Queue empty</div>
            </div>

            <br>
            <a href="/admin" style="color: var(--accent-color); text-decoration: none;">&rarr; Go to Admin Dashboard</a>
        </div>

        <!-- Logs -->
        <div class="logs" id="log-window">
            <div>System initialized...</div>
        </div>
    </div>

    <script>
        // State
        let isPaused = false;
        const metaCache = JSON.parse(localStorage.getItem('yt2ia_meta_cache') || '{}');

        // Utils
        function handleEnter(e) {
            if (e.key === 'Enter') performSearch();
        }

        async function fetchMeta(id) {
            if (metaCache[id]) return metaCache[id];

            try {
                // Determine if it's an artist ID (usually 24 chars starting with UC)
                // But simplified: just try to fetch
                const res = await fetch(`/api/meta?id=${id}`);
                const data = await res.json();
                if (data.name) {
                    const meta = {
                        name: data.name,
                        avatar: (data.thumbnails && data.thumbnails.length) ? data.thumbnails[0].url : null
                    };
                    metaCache[id] = meta;
                    localStorage.setItem('yt2ia_meta_cache', JSON.stringify(metaCache));
                    return meta;
                }
            } catch (e) { console.log("Meta fetch failed", e); }
            return null;
        }

        // Search
        async function performSearch() {
            const query = document.getElementById('search-query').value;
            const filter = document.getElementById('search-filter').value;
            const area = document.getElementById('results-area');

            if (!query) return;

            area.innerHTML = '<div style="text-align:center">Searching...</div>';

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(query)}&filter=${filter}`);
                const data = await res.json();

                area.innerHTML = '';

                if (!data || data.length === 0) {
                    area.innerHTML = '<div style="text-align:center">No results found</div>';
                    return;
                }

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';

                    const imgUrl = (item.thumbnails && item.thumbnails.length) ? item.thumbnails[0].url : '';

                    div.innerHTML = `
                        <img src="${imgUrl}" class="result-img" onerror="this.style.display='none'">
                        <div class="result-info">
                            <div class="result-title">${item.name || item.title}</div>
                            <div class="result-sub">${item.browseId || item.videoId} • ${filter}</div>
                        </div>
                        <button class="add-btn" id="btn-${item.browseId || item.videoId}" onclick="addToQueue('${item.browseId || item.videoId}', '${item.name || item.title}')">Add</button>
                    `;
                    area.appendChild(div);
                });

            } catch (e) {
                area.innerHTML = '<div style="color:var(--danger-color)">Search failed</div>';
            }
        }

        // Actions
        async function addToQueue(id, name) {
            const btn = document.getElementById(`btn-${id}`);
            if (btn) btn.textContent = '...';

            let url = '/submit'; // default
            let body = { input_id: id };

            // Heuristic for artists
            if (id.startsWith('UC') && id.length > 20) {
                url = '/submitartist';
                body = { browse_id: id, name: name || "" };
            }

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (btn) {
                    if (data.duplicate) {
                        btn.textContent = 'EXISTS';
                        btn.className = 'add-btn exists';
                    } else {
                        btn.textContent = 'ADDED';
                        setTimeout(() => btn.textContent = 'Add', 2000);
                    }
                }
            } catch (e) {
                if (btn) btn.textContent = 'Error';
            }
        }

        async function submitManual() {
            const input = document.getElementById('manual-id');
            const id = input.value.trim();
            if (!id) return;

            try {
                const res = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input_id: id })
                });
                const data = await res.json();

                if (data.duplicate) {
                    alert('Already in queue!');
                } else {
                    alert('Added to queue');
                    input.value = '';
                }
            } catch (e) { alert('Failed'); }
        }

        async function togglePause() {
            const btn = document.getElementById('pause-btn');
            if (isPaused) {
                // Resume
                await fetch('/api/resume');
                // State will update via SSE
            } else {
                // Pause
                await fetch('/api/pause?duration=3600');
            }
        }

        async function startProcessing() {
            await fetch('/api/start');
        }

        // SSE & Updates
        const evtSource = new EventSource("/stream");
        const queueArea = document.getElementById('queue-area');
        const logWindow = document.getElementById('log-window');

        let lastQueueIds = [];

        evtSource.onmessage = function (event) {
            const data = JSON.parse(event.data);

            // Basics
            document.getElementById('queue-count').textContent = data.queue_count;
            document.getElementById('idle-timer').textContent = data.idle_seconds;
            document.getElementById('current-index').textContent = data.current_index;

            // Status Badge
            const badge = document.getElementById('status-badge');
            const pauseTime = data.paused_until || 0;
            const now = Date.now() / 1000;

            if (pauseTime > now) {
                isPaused = true;
                const minLeft = Math.ceil((pauseTime - now) / 60);
                badge.className = 'badge paused';
                badge.textContent = `PAUSED (${minLeft}m)`;

                const pBtn = document.getElementById('pause-btn');
                if (pBtn) {
                    pBtn.textContent = "RESUME";
                    pBtn.className = "pause-btn resume-btn";
                    pBtn.style.backgroundColor = "var(--success-color)";
                }
            } else {
                isPaused = false;
                const pBtn = document.getElementById('pause-btn');
                if (pBtn) {
                    pBtn.textContent = "PAUSE 1H";
                    pBtn.className = "pause-btn";
                    pBtn.style.backgroundColor = "var(--amber-color)";
                }

                if (data.is_processing) {
                    badge.className = 'badge processing';
                    badge.textContent = `Processing: ${data.current_id}`;
                } else {
                    badge.className = 'badge idle';
                    badge.textContent = 'Idle';
                }
            }

            // Logs
            if (data.logs && data.logs.length) {
                logWindow.innerHTML = data.logs.map(l => `<div>${l}</div>`).join('');
                logWindow.scrollTop = logWindow.scrollHeight;
            }

            // Queue List Update (Optimization: only if count changes or force reload occasionally could be better, but we'll simplistic diffing)
            // Actually, for visual smoothness, let's fetch full queue occasionally or use a separate loop?
            // SSE doesn't send the full queue list (too big). We need to fetch it separately.
            // But we can trigger a fetch if queue_count changes significantly or we haven't in a while.
            // For now, let's just refresh queue list every 5 seconds via separate interval if user is looking.
        };

        // Poll Queue List
        setInterval(async () => {
            try {
                const res = await fetch('/api/queue');
                const qData = await res.json();
                const items = qData.items || [];

                // Diff check to avoid DOM thrashing if identical? 
                // Simple version: just rebuild
                if (items.length === 0) {
                    queueArea.innerHTML = '<div style="text-align: center; color: #94a3b8;">Queue empty</div>';
                    return;
                }

                // We want to preserve existing elements if possible to keep images loaded
                // But simple rebuilding is safer for correctness right now.

                // Build HTML
                let html = '';
                for (const id of items) {
                    // Check cache
                    const meta = metaCache[id] || { name: '...', avatar: null };
                    // If unknown, trigger fetch (async, won't block)
                    if (meta.name === '...') fetchMeta(id);

                    const activeClass = (document.getElementById('status-badge').textContent.includes(id)) ? 'active' : '';

                    const avatarStyle = meta.avatar ? `background-image: url('${meta.avatar}')` : '';

                    html += `
                        <div class="queue-item ${activeClass}" id="q-item-${id}">
                            <div class="q-avatar" style="${avatarStyle}"></div>
                            <div class="q-info">
                                <div class="q-name">${meta.name === '...' ? 'Loading...' : meta.name}</div>
                                <div class="q-id">${id}</div>
                            </div>
                        </div>
                    `;
                }
                queueArea.innerHTML = html;

            } catch (e) { }
        }, 3000);

    </script>
</body>

</html>
