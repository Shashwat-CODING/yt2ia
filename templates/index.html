<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Engine | Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #fbbf24;
            --danger: #ef4444;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem;
            line-height: 1.5;
        }

        .dashboard {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 2fr 1.2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* Shared Components */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-body {
            padding: 1.5rem;
        }

        .btn {
            background: var(--surface-hover);
            color: var(--text-main);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .input-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .input-box:focus {
            border-color: var(--accent);
        }

        /* Stats Row */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.25rem;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-badge.active .status-dot {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-badge.processing .status-dot {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .status-badge.paused .status-dot {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }

        /* Activity Feed */
        .activity-feed {
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease;
        }

        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        /* Queue List */
        .queue-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .queue-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .queue-img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: var(--border);
            object-fit: cover;
        }

        .queue-info {
            flex: 1;
            min-width: 0;
        }

        .queue-title {
            font-weight: 500;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .queue-id {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .queue-status {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Toggle Switch */
        .toggle-logs {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
        }

        #rawLogs {
            display: none;
            margin-top: 1rem;
            font-family: 'JetBrains Mono';
            font-size: 0.8rem;
            color: var(--text-muted);
            height: 150px;
            overflow-y: auto;
            background: #000;
            padding: 1rem;
            border-radius: 8px;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background: #000;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>

    <div class="dashboard">
        <!-- Left Column: Controls & Feed -->
        <main>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
                <h1 style="font-size:1.5rem; font-weight:700;">Archive Engine</h1>
                <div id="system-status" class="status-badge">
                    <div class="status-dot"></div>
                    <span id="status-text">System Ready</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-val" id="processed-count">0</div>
                    <div class="stat-label">Processed Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="queue-size">0</div>
                    <div class="stat-label">In Queue</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="idle-time">0s</div>
                    <div class="stat-label">Idle Time</div>
                </div>
            </div>

            <div id="current-job-card" class="card" style="margin-bottom: 2rem; display: none;">
                <div class="card-header">
                    <span>Currently Processing</span>
                    <span id="current-source"
                        style="font-size:0.8rem; color:var(--text-muted); font-weight:400;">Source: Auto</span>
                </div>
                <div class="card-body">
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div>
                            <div id="curr-title" style="font-size:1.1rem; font-weight:600; margin-bottom:4px;">
                                Loading...</div>
                            <div id="curr-status" style="color:var(--accent);">Initializing...</div>
                        </div>
                        <div id="curr-percent" style="font-size:1.5rem; font-weight:700; color:var(--text-muted);">0%
                        </div>
                    </div>
                    <div class="progress-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span>Add to Queue</span>
                </div>
                <div class="card-body">
                    <form id="searchForm" style="display:flex; gap:10px; margin-bottom: 1rem;">
                        <input type="text" id="searchInput" class="input-box" placeholder="Search for an artist..."
                            autocomplete="off">
                        <button type="submit" class="btn btn-primary">Search</button>
                    </form>
                    <div id="searchResults"></div>

                    <div style="margin: 1.5rem 0; border-top: 1px solid var(--border);"></div>

                    <div style="display:flex; gap:10px;">
                        <input type="text" id="manualInput" class="input-box"
                            placeholder="Enter Playlist/Video ID directly...">
                        <button id="manualBtn" class="btn">Add ID</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Column: Queue & Logs -->
        <aside style="display:flex; flex-direction:column; gap: 2rem;">

            <div class="card" style="flex: 1;">
                <div class="card-header">
                    <span>Execution Queue</span>
                    <button class="btn" style="padding:4px 8px; font-size:0.8rem;" onclick="refreshQueue()">↻</button>
                </div>
                <div class="card-body" style="padding:0; flex:1; overflow-y:auto; max-height:400px;" id="queueList">
                    <div style="padding:2rem; text-align:center; color:var(--text-muted);">No items in queue</div>
                </div>
                <div style="padding:1rem; border-top:1px solid var(--border); display:flex; gap:10px;">
                    <button id="pauseBtn" class="btn" style="flex:1; background:var(--surface-hover);">Pause 1h</button>
                    <button id="startBtn" class="btn btn-primary" style="flex:1;" onclick="startProcessing()">Start
                        Now</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span>Recent Activity</span>
                    <button class="toggle-logs" onclick="toggleRawLogs()">Show Debug Logs</button>
                </div>
                <div class="card-body" style="padding:1rem;">
                    <div id="activityFeed" class="activity-feed">
                        <!-- User friendly logs go here -->
                        <div class="activity-item">
                            <div class="activity-icon">🚀</div>
                            <div>System initialized and ready.</div>
                        </div>
                    </div>
                    <div id="rawLogs">
                        <!-- Raw textual logs -->
                    </div>
                </div>
            </div>

        </aside>
    </div>

    <script>
        // --- Logic ---
        let evtSource;
        let lastLog = '';
        const metaCache = JSON.parse(localStorage.getItem('yt2ia_meta_cache') || '{}');

        // Toggle Debug Logs
        function toggleRawLogs() {
            const el = document.getElementById('rawLogs');
            const btn = document.querySelector('.toggle-logs');
            if (el.style.display === 'block') {
                el.style.display = 'none';
                btn.innerText = 'Show Debug Logs';
            } else {
                el.style.display = 'block';
                btn.innerText = 'Hide Debug Logs';
            }
        }

        async function getArtistMeta(id) {
            if (metaCache[id]) return metaCache[id];
            try {
                const res = await fetch(`/api/meta?id=${id}`);
                const data = await res.json();
                if (data.artistName || data.name) { // Handle both API styles if needed
                    const meta = {
                        name: data.artistName || data.name,
                        thumb: data.artistAvatar || (data.thumbnails && data.thumbnails[0]?.url) || ''
                    };
                    metaCache[id] = meta;
                    localStorage.setItem('yt2ia_meta_cache', JSON.stringify(metaCache));
                    return meta;
                }
            } catch (e) { }
            return { name: id, thumb: '' };
        }

        function addActivity(msg, type = 'info') {
            const feed = document.getElementById('activityFeed');
            const div = document.createElement('div');
            div.className = 'activity-item';

            let icon = 'ℹ️';
            if (type === 'download') icon = '⬇️';
            if (type === 'upload') icon = '⬆️';
            if (type === 'success') icon = '✅';
            if (type === 'error') icon = '⚠️';

            div.innerHTML = `<div class="activity-icon">${icon}</div><div>${msg}</div>`;
            feed.insertBefore(div, feed.firstChild);

            if (feed.children.length > 20) feed.lastChild.remove();
        }

        function updateSystemStatus(data) {
            const badge = document.getElementById('system-status');
            const text = document.getElementById('status-text');
            const now = Date.now() / 1000;

            if (data.paused_until > now) {
                badge.className = 'status-badge paused';
                const mm = Math.ceil((data.paused_until - now) / 60);
                text.innerText = `Paused (${mm}m)`;
                document.getElementById('pauseBtn').innerText = "Resume";
                document.getElementById('pauseBtn').onclick = () => fetch('/api/resume');
            } else if (data.is_processing) {
                badge.className = 'status-badge processing';
                text.innerText = 'Processing...';
                document.getElementById('pauseBtn').innerText = "Pause 1h";
                document.getElementById('pauseBtn').onclick = () => fetch('/api/pause?duration=3600');
            } else {
                badge.className = 'status-badge active';
                text.innerText = 'System Ready';
                document.getElementById('pauseBtn').innerText = "Pause 1h";
                document.getElementById('pauseBtn').onclick = () => fetch('/api/pause?duration=3600');
            }
        }

        function updateCurrentJob(data) {
            const card = document.getElementById('current-job-card');

            if (!data.is_processing || !data.active_jobs || Object.keys(data.active_jobs).length === 0) {
                card.style.display = 'none';
                return;
            }

            card.style.display = 'flex';
            const jobId = Object.keys(data.active_jobs)[0];
            const job = data.active_jobs[jobId];

            // Title & Artist
            let displayTitle = job.title || jobId;
            if (job.artist && job.artist !== 'Unknown') {
                displayTitle = `${job.title} - ${job.artist}`;
            }
            document.getElementById('curr-title').innerText = displayTitle;

            // Status & Size
            let statusText = job.status;
            if (job.state === 'downloading' && job.total_size) {
                const mb = (job.total_size / (1024 * 1024)).toFixed(1);
                statusText += ` (${mb} MB)`;
            }
            document.getElementById('curr-status').innerText = statusText;

            document.getElementById('curr-percent').innerText = `${job.progress || 0}%`;
            document.getElementById('progress-bar').style.width = `${job.progress || 0}%`;

            // Source
            if (job.source) {
                document.getElementById('current-source').innerText = `Source: ${job.source}`;
            } else {
                // Fallback detection
                if (job.status.includes('Zeabur')) document.getElementById('current-source').innerText = 'Source: Zeabur';
                else if (job.status.includes('Piped')) document.getElementById('current-source').innerText = 'Source: Piped';
                else if (job.status.includes('RapidAPI')) document.getElementById('current-source').innerText = 'Source: RapidAPI';
                else document.getElementById('current-source').innerText = 'Source: Auto';
            }
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            const evtSource = new EventSource("/stream");

            evtSource.onmessage = (e) => {
                const data = JSON.parse(e.data);

                // Stats
                document.getElementById('processed-count').innerText = data.stats?.processed || 0;
                document.getElementById('queue-size').innerText = data.queue_count;
                document.getElementById('idle-time').innerText = `${data.idle_seconds}s`;

                updateSystemStatus(data);
                updateCurrentJob(data);

                // Logs Parsing for User Feed
                if (data.logs && data.logs.length) {
                    const latest = data.logs[data.logs.length - 1];
                    if (latest !== lastLog) {
                        lastLog = latest;
                        const rawDiv = document.getElementById('rawLogs');
                        rawDiv.innerHTML += `<div>> ${latest}</div>`;
                        rawDiv.scrollTop = rawDiv.scrollHeight;

                        // Smart Activity Feed Logic
                        if (latest.includes('Downloading:')) return; // Ignore spammy progress logs

                        if (latest.includes('Download complete')) addActivity('Download finished', 'download');
                        else if (latest.includes('Uploading to IA')) addActivity('Uploading to Archive.org...', 'upload');
                        else if (latest.includes('Upload success')) addActivity('Archived successfully!', 'success');
                        else if (latest.includes('Source:')) addActivity(latest.split('timestamp')[0], 'info');
                        else if (latest.includes('ERROR')) addActivity(latest, 'error');
                    }
                }
            };

            refreshQueue();
            setupSearch();
            setupManual();
        });

        // --- Standard API Calls ---
        async function refreshQueue() {
            const container = document.getElementById('queueList');
            const res = await fetch('/api/queue');
            const data = await res.json();

            if (!data.items || data.items.length === 0) {
                container.innerHTML = '<div style="padding:2rem; text-align:center; color:var(--text-muted);">No items in queue</div>';
                return;
            }

            container.innerHTML = '';
            for (const id of data.items) {
                const item = document.createElement('div');
                item.className = 'queue-item';
                item.innerHTML = `
                    <div class="queue-img" id="thumb-${id}"></div>
                    <div class="queue-info">
                        <div class="queue-title" id="name-${id}">Loading...</div>
                        <div class="queue-id">${id}</div>
                    </div>
                `;
                container.appendChild(item);

                // Lazy load meta
                getArtistMeta(id).then(meta => {
                    document.getElementById(`name-${id}`).innerText = meta.name;
                    if (meta.thumb) {
                        const img = document.getElementById(`thumb-${id}`);
                        img.style.background = `url(${meta.thumb}) center/cover`;
                    }
                });
            }
        }

        async function startProcessing() { await fetch('/api/start'); }

        function setupSearch() {
            document.getElementById('searchForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const q = document.getElementById('searchInput').value.trim();
                const resDiv = document.getElementById('searchResults');
                if (!q) return;

                resDiv.innerHTML = '<div style="padding:1rem; text-align:center; color:var(--text-muted);">Searching...</div>';

                try {
                    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&filter=artists`);
                    const data = await res.json();

                    if (data.results?.length) {
                        resDiv.innerHTML = `<div style="display:flex; flex-direction:column; gap:8px; margin-top:1rem;">` +
                            data.results.map(a => `
                                <div style="display:flex; align-items:center; gap:10px; padding:8px; background:rgba(255,255,255,0.05); border-radius:8px;">
                                    <img src="${a.thumbnails?.[0]?.url}" style="width:32px; height:32px; border-radius:4px; object-fit:cover;">
                                    <div style="flex:1;">
                                        <div style="font-size:0.9rem; font-weight:500;">${a.title}</div>
                                        <div style="font-size:0.7rem; color:var(--text-muted);">${a.browseId}</div>
                                    </div>
                                    <button class="btn" style="font-size:0.8rem; padding:4px 8px;" onclick="addArtist('${a.browseId}', '${a.title}')">Add</button>
                                </div>
                            `).join('') + `</div>`;
                    } else {
                        resDiv.innerHTML = '<div style="padding:1rem; text-align:center; color:var(--text-muted);">No results found</div>';
                    }
                } catch (e) {
                    resDiv.innerHTML = '<div style="padding:1rem; text-align:center; color:var(--danger);">Search failed</div>';
                }
            });
        }

        function setupManual() {
            document.getElementById('manualBtn').addEventListener('click', async () => {
                const id = document.getElementById('manualInput').value.trim();
                if (!id) return;

                // Optimistic UI
                addActivity(`Manually adding ID: ${id}`, 'info');

                const res = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input_id: id })
                });
                const data = await res.json();

                if (data.duplicate) {
                    addActivity(`Skipped duplicate ID: ${id}`, 'warning');
                    alert('This ID is already in the queue!');
                } else {
                    addActivity(`Successfully added: ${id}`, 'success');
                    document.getElementById('manualInput').value = '';
                    refreshQueue();
                }
            });
        }

        async function addArtist(id, name) {
            addActivity(`Adding artist: ${name}...`, 'info');
            const res = await fetch('/submitartist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ browse_id: id, name: name })
            });
            const data = await res.json();
            if (data.duplicate) {
                addActivity(`${name} is already in queue!`, 'warning');
            } else {
                addActivity(`${name} added to queue`, 'success');
                refreshQueue();
            }
        }
    </script>
</body>

</html>
