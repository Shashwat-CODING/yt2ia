<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT2IA // ADMIN CONSOLE</title>
    <style>
        :root {
            /* Admin Palette: Stricter, Darker */
            --bg-body: #050505;
            --bg-surface: #111;
            --border: #333;

            --text-main: #e0e0e0;
            --text-muted: #666;

            --accent: #00f0ff;
            /* Cyan for primary actions */
            --danger: #ff2a2a;
            /* Red for delete */
            --success: #00ff9d;

            --font-stack: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Consolas', monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-stack);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* --- Header --- */
        .admin-header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand span {
            color: var(--danger);
        }

        /* Red accent for Admin */
        .tag {
            font-size: 0.65rem;
            background: var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            color: #888;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0, 255, 157, 0.4);
        }

        .dot.offline {
            background: var(--danger);
            box-shadow: none;
        }

        /* --- Main Layout --- */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .dashboard-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .card-title {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        /* --- Table Styling --- */
        .queue-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .q-row {
            display: grid;
            grid-template-columns: 60px 2fr 1.5fr 100px;
            /* Avatar | Name | ID | Actions */
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .q-row:last-child {
            border-bottom: none;
        }

        .q-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .col-avatar img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
            border: 1px solid #333;
        }

        .col-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .col-name small {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: normal;
        }

        .col-id {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
            width: fit-content;
        }

        .col-actions {
            text-align: right;
        }

        .btn-del {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--danger);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-del:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .empty-msg {
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }

        /* --- Animations --- */
        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        .loading-text {
            animation: pulse 1.5s infinite;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .q-row {
                grid-template-columns: 50px 1fr 50px;
                /* Avatar | Name+ID | Action */
                gap: 10px;
                padding: 1rem;
            }

            .col-id {
                display: none;
            }

            /* Hide raw ID on mobile to save space */
            .col-name small {
                display: block;
            }

            /* Show "Artist" tag or similar */
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <div class="brand">
            YT2IA <span>//</span> ADMIN <div class="tag">SECURE</div>
        </div>
        <div class="header-controls">
            <div class="live-indicator">
                <div class="dot" id="status-dot"></div>
                <span id="status-text">LIVE POLLING</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="dashboard-card">
            <div class="card-header">
                <div class="card-title">Current Queue Management</div>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted);">
                    COUNT: <span id="queue-count" style="color: var(--text-main); font-weight: bold;">0</span>
                </div>
            </div>

            <div id="queue-container">
                <div class="empty-msg loading-text">Connecting to system...</div>
            </div>
        </div>

        <div style="margin-top: 1rem; text-align: center;">
            <a href="/"
                style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-family: var(--font-mono);">←
                RETURN TO MISSION CONTROL</a>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const REFRESH_RATE = 5000; // 5 Seconds
        const metaCache = JSON.parse(localStorage.getItem('yt2ia_admin_cache') || '{}');
        let refreshInterval;

        // --- Core Functions ---

        // 1. Fetch Artist Metadata (External API)
        async function fetchArtistMeta(id) {
            if (metaCache[id]) return metaCache[id];

            try {
                // Using the specific external API endpoint requested
                const res = await fetch(`https://ytify-backend.vercel.app/api/artist/${id}`);
                const data = await res.json();

                if (data.artistName) {
                    const meta = {
                        name: data.artistName,
                        avatar: data.artistAvatar
                    };
                    metaCache[id] = meta;
                    localStorage.setItem('yt2ia_admin_cache', JSON.stringify(metaCache));
                    return meta;
                }
            } catch (e) { console.error("Meta fetch error", e); }

            // Fallback
            return { name: 'Unknown Item', avatar: null };
        }

        // 2. Remove Item
        async function removeItem(id) {
            if (!confirm(`Permanently remove ${id}?`)) return;

            // Optimistic UI update: Remove row immediately to feel fast
            const row = document.getElementById(`row-${id}`);
            if (row) row.style.opacity = '0.3';

            try {
                const res = await fetch(`/api/queue/remove/${id}`, { method: 'POST' });
                // Force immediate refresh
                fetchQueue();
            } catch (e) {
                alert('Delete failed');
                if (row) row.style.opacity = '1';
            }
        }

        // 3. Main Queue Fetch Loop
        async function fetchQueue() {
            const container = document.getElementById('queue-container');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            try {
                const res = await fetch('/api/queue');
                const data = await res.json();
                const items = data.items || []; // Array of IDs

                // Update Status UI
                statusDot.className = "dot"; // Green
                statusText.innerText = "LIVE POLLING";

                document.getElementById('queue-count').innerText = items.length;

                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-msg">Queue is currently empty.</div>';
                    return;
                }

                // Render List
                // To avoid flickering, we build HTML string. 
                // For a true "React-like" experience in vanilla JS, we'd diff the DOM, 
                // but for Admin dashboard, rewriting innerHTML is acceptable if cached images prevent blink.

                let html = '<ul class="queue-list">';

                // We map items to promises to fetch meta in parallel (if not cached) 
                // However, to keep render fast, we render cached data immediately and "lazy load" the rest.

                for (const id of items) {
                    // Check cache immediately
                    let meta = metaCache[id] || { name: 'Resolving...', avatar: null };

                    // If Resolving, trigger fetch in background
                    if (meta.name === 'Resolving...') {
                        fetchArtistMeta(id).then(m => {
                            // Finds elements by ID and updates them after fetch
                            const elName = document.getElementById(`name-${id}`);
                            const elImg = document.getElementById(`img-${id}`);
                            if (elName) elName.innerText = m.name;
                            if (elImg && m.avatar) elImg.src = m.avatar;
                        });
                    }

                    // Avatar logic
                    const avatarSrc = meta.avatar || 'https://via.placeholder.com/40/222/333?text=?';

                    html += `
                        <li class="q-row" id="row-${id}">
                            <div class="col-avatar">
                                <img src="${avatarSrc}" id="img-${id}" onerror="this.src='https://via.placeholder.com/40/222/333?text=?'">
                            </div>
                            <div class="col-name">
                                <span id="name-${id}">${meta.name}</span>
                                <small>Artist Entry</small>
                            </div>
                            <div class="col-id">${id}</div>
                            <div class="col-actions">
                                <button class="btn-del" onclick="removeItem('${id}')">DELETE</button>
                            </div>
                        </li>
                    `;
                }
                html += '</ul>';

                // Only update DOM if the content is actually different (simple string check to reduce cursor jump)
                // Note: This is a poor man's React.
                if (container.innerHTML !== html) {
                    container.innerHTML = html;
                }

            } catch (e) {
                console.error(e);
                statusDot.className = "dot offline";
                statusText.innerText = "CONNECTION LOST";
            }
        }

        // --- Init ---
        // Load immediately
        fetchQueue();

        // Poll every 5 seconds
        refreshInterval = setInterval(fetchQueue, REFRESH_RATE);

        // Visibility API: Stop polling when tab is hidden to save resources
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                clearInterval(refreshInterval);
            } else {
                fetchQueue();
                refreshInterval = setInterval(fetchQueue, REFRESH_RATE);
            }
        });

    </script>
</body>

</html>
